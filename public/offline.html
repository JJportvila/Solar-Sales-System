<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f3b66" />
    <title>离线中</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #edf4fb 0%, #f8fbfd 100%);
        color: #0f172a;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .card {
        max-width: 420px;
        background: #ffffff;
        border: 1px solid rgba(15, 59, 102, 0.1);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(15, 59, 102, 0.08);
      }
      h1 {
        margin: 12px 0 0;
        font-size: 28px;
      }
      p {
        margin: 10px 0 0;
        color: #64748b;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        margin-top: 18px;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border-radius: 16px;
        background: #0f3b66;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size:14px;font-weight:700;color:#0f3b66;">Solar Sales Mobile</div>
      <h1>当前离线</h1>
      <p>网络暂时不可用。已缓存的手机页面仍可继续打开，涉及实时数据提交的操作请等网络恢复后再试。</p>
      <a href="/mobile-app.html">返回手机工作台</a>
    </div>
  </body>
</html>
