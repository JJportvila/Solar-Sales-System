<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>光伏管理系统 / 报告中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              secondary: "#7f5700",
              "secondary-container": "#feb316",
              background: "#f8f9fa",
              primary: "#001d44",
              "surface-container-low": "#f3f4f5",
              "outline-variant": "#c3c6d1"
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }
      body { font-family: "Inter", sans-serif; }
      h1, h2, h3, h4, h5 { font-family: "Manrope", sans-serif; }
    </style>
  </head>
  <body class="bg-background text-slate-900 min-h-screen flex" data-nav="reports">
    <aside id="app-sidebar" class="hidden md:flex flex-col h-screen w-64 bg-slate-50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] fixed left-0 top-0 z-40 py-6"></aside>
    <header id="app-header" class="fixed top-0 w-full md:w-[calc(100%-16rem)] z-30 bg-white/80 backdrop-blur-md flex justify-between items-center px-6 h-16 shadow-sm border-b border-slate-100/10"></header>

    <main class="flex-1 md:ml-64 pb-16">
      <div class="w-full max-w-[1520px] mx-auto px-6 lg:px-8 xl:px-10 py-6 lg:py-8 space-y-8">
        <section class="flex flex-col gap-6 xl:flex-row xl:items-end xl:justify-between">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">报告中心</p>
            <h1 class="mt-3 text-3xl md:text-4xl font-extrabold text-primary tracking-tight">报告中心</h1>
            <p class="mt-3 max-w-3xl text-sm text-slate-600">生成并导出财务、销售、库存和员工佣金相关分析报表。</p>
          </div>
          <div class="rounded-[1.75rem] bg-white px-5 py-4 border border-outline-variant/10 shadow-sm flex flex-wrap items-end gap-4">
            <label class="block">
              <span class="mb-2 block text-[11px] font-bold uppercase tracking-wider text-secondary">开始日期</span>
              <input id="reports-start-date" class="rounded-xl border border-outline-variant/25 px-4 py-3 text-sm" type="date" />
            </label>
            <label class="block">
              <span class="mb-2 block text-[11px] font-bold uppercase tracking-wider text-secondary">结束日期</span>
              <input id="reports-end-date" class="rounded-xl border border-outline-variant/25 px-4 py-3 text-sm" type="date" />
            </label>
            <button id="reports-refresh-btn" class="rounded-xl bg-primary px-5 py-3 text-sm font-bold text-white flex items-center gap-2">
              <span class="material-symbols-outlined">filter_list</span>
              <span>更新预览</span>
            </button>
          </div>
        </section>

        <section class="grid grid-cols-1 gap-6 md:grid-cols-12">
          <div id="reports-finance-card" class="md:col-span-8 rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm text-left transition hover:-translate-y-0.5 hover:shadow-md cursor-pointer">
            <div class="flex flex-col gap-6 xl:flex-row xl:items-start xl:justify-between">
              <div class="flex items-start gap-4">
                <div class="w-14 h-14 rounded-2xl bg-primary/10 text-primary flex items-center justify-center">
                  <span class="material-symbols-outlined text-3xl">account_balance_wallet</span>
                </div>
                <div>
                  <h2 class="text-xl font-extrabold text-primary">财务对账单</h2>
                  <p class="mt-2 text-sm text-slate-500">包含应收、税务与整体结算进度摘要，点击查看明细。</p>
                </div>
              </div>
              <div class="flex gap-2">
                <button id="reports-export-pdf" class="rounded-xl bg-surface-container-low px-4 py-3 text-xs font-bold text-primary flex items-center gap-2" type="button">
                  <span class="material-symbols-outlined text-base">picture_as_pdf</span>
                  <span>打印预览</span>
                </button>
                <button id="reports-export-excel" class="rounded-xl bg-secondary px-4 py-3 text-xs font-bold text-white flex items-center gap-2" type="button">
                  <span class="material-symbols-outlined text-base">download</span>
                  <span>导出 Excel</span>
                </button>
              </div>
            </div>
            <div class="mt-8 grid grid-cols-1 gap-4 md:grid-cols-3">
              <div class="rounded-2xl bg-surface-container-low px-5 py-4"><div class="text-[11px] uppercase tracking-wider text-slate-400">总计对账额</div><div id="reports-finance-total" class="mt-2 text-3xl font-black text-primary">VT 0</div></div>
              <div class="rounded-2xl bg-surface-container-low px-5 py-4"><div class="text-[11px] uppercase tracking-wider text-slate-400">待结算项</div><div id="reports-pending-count" class="mt-2 text-3xl font-black text-red-500">0</div></div>
              <div class="rounded-2xl bg-surface-container-low px-5 py-4"><div class="text-[11px] uppercase tracking-wider text-slate-400">结算进度</div><div id="reports-settlement-rate" class="mt-2 text-3xl font-black text-cyan-500">0%</div></div>
            </div>
          </div>

          <button id="reports-inventory-card" class="md:col-span-4 rounded-[2rem] bg-primary p-8 text-white relative overflow-hidden text-left transition hover:-translate-y-0.5 hover:shadow-xl">
            <div class="relative z-10">
              <div class="flex items-start justify-between">
                <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center"><span class="material-symbols-outlined">analytics</span></div>
                <span class="rounded-full bg-secondary-container px-3 py-1 text-[10px] font-black text-primary">实时数据</span>
              </div>
              <h2 class="mt-10 text-2xl font-extrabold">库存周转率</h2>
              <p class="mt-2 text-sm text-blue-100">评估备货与组件消耗速度，点击查看库存明细。</p>
              <div id="reports-inventory-turnover" class="mt-10 text-5xl font-black">0x</div>
            </div>
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.18),transparent_30%),linear-gradient(180deg,transparent,rgba(0,0,0,0.1))]"></div>
          </button>

          <div class="md:col-span-6 rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm">
            <div class="flex items-start justify-between gap-4">
              <div class="flex items-start gap-4">
                <div class="w-14 h-14 rounded-2xl bg-cyan-100 text-cyan-700 flex items-center justify-center"><span class="material-symbols-outlined text-3xl">point_of_sale</span></div>
                <div>
                  <h2 class="text-xl font-extrabold text-primary">月度销售报告</h2>
                  <p class="mt-2 text-sm text-slate-500">区域签约额与报价转化趋势，点击月份柱条查看详细。</p>
                </div>
              </div>
            </div>
            <div id="reports-monthly-sales" class="mt-8 flex h-44 items-end gap-2 px-2"></div>
          </div>

          <div class="md:col-span-6 rounded-[2rem] bg-surface-container-low p-8 border border-outline-variant/10 shadow-sm">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="flex items-center gap-3"><span class="material-symbols-outlined text-secondary">groups</span><h2 class="text-xl font-extrabold text-primary">员工佣金结算表</h2></div>
                <p class="mt-2 text-sm text-slate-500">基于销售签约和维修工单动态计算佣金，点击人员查看明细。</p>
              </div>
              <div class="text-right">
                <div class="text-[11px] uppercase tracking-wider text-secondary font-bold">待结总额</div>
                <div id="reports-commission-total" class="mt-2 text-4xl font-black text-primary">VT 0</div>
              </div>
            </div>
            <div id="reports-commission-list" class="mt-6 space-y-3"></div>
            <button id="reports-export-commission" class="mt-6 w-full rounded-xl border-2 border-dashed border-primary px-4 py-3 text-sm font-bold text-primary" type="button">
              查看全部佣金明细
            </button>
          </div>
        </section>

        <section class="rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm">
          <div class="flex items-center justify-between gap-4">
            <h2 class="text-2xl font-extrabold text-primary">最近导出历史</h2>
            <button class="text-sm font-bold text-secondary" type="button">清除所有历史</button>
          </div>
          <div class="mt-8 overflow-x-auto">
            <table class="w-full min-w-[720px]">
              <thead>
                <tr class="border-b border-outline-variant/15 text-left text-xs uppercase tracking-wider text-slate-400">
                  <th class="pb-4">报告名称</th>
                  <th class="pb-4">导出时间</th>
                  <th class="pb-4">格式</th>
                  <th class="pb-4">状态</th>
                  <th class="pb-4 text-right">操作</th>
                </tr>
              </thead>
              <tbody id="reports-history-body" class="divide-y divide-outline-variant/10"></tbody>
            </table>
          </div>
        </section>

        <section id="reports-detail-panel" class="hidden rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm">
          <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
            <div>
              <p id="reports-detail-kicker" class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">详情</p>
              <h2 id="reports-detail-title" class="mt-3 text-2xl font-extrabold text-primary">详情面板</h2>
              <p id="reports-detail-summary" class="mt-3 text-sm leading-7 text-slate-600"></p>
            </div>
            <button id="reports-detail-close" class="rounded-xl border border-outline-variant/20 bg-white px-4 py-2 text-sm font-bold text-primary" type="button">关闭</button>
          </div>
          <div id="reports-detail-stats" class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-3"></div>
          <div id="reports-detail-table-wrap" class="mt-6 overflow-x-auto"></div>
        </section>
      </div>
    </main>

    <div id="reports-printable" class="hidden"></div>

    <script src="/shared-nav.js"></script>
    <script src="/shared-header.js"></script>
    <script src="/reports.js"></script>
  </body>
</html>
