<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f3b66" />
    <title>个人考勤详情</title>
    <link rel="icon" href="/mobile-icon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #edf3f8;
        --card: rgba(255, 255, 255, 0.96);
        --line: rgba(15, 59, 102, 0.12);
        --text: #0f172a;
        --muted: #64748b;
        --primary: #0f3b66;
        --primary-2: #17558c;
        --accent: #0ea5e9;
        --accent-soft: rgba(14, 165, 233, 0.14);
        --success: #15803d;
        --warning: #b45309;
        --danger: #b91c1c;
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(59, 130, 246, 0.16), transparent 28%),
          linear-gradient(180deg, #edf4fb 0%, var(--bg) 38%, #e8eef4 100%);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      a { color: inherit; text-decoration: none; }
      button, input { font: inherit; }

      .shell {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 28px);
      }

      .hero {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .hero h1 {
        margin: 0;
        font-size: 21px;
        line-height: 1.2;
      }
      .hero-copy {
        min-width: 0;
        flex: 1;
      }
      .hero-copy p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        border: none;
        border-radius: 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.secondary {
        color: var(--primary);
        background: #e8eef5;
      }
      .btn.soft {
        color: var(--primary);
        background: #eef4fb;
        border: 1px solid rgba(15, 59, 102, 0.12);
      }

      .section {
        margin-top: 14px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--card);
        box-shadow: 0 10px 24px rgba(15, 59, 102, 0.05);
      }
      .section h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .grid {
        display: grid;
        gap: 10px;
      }
      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric,
      .list-item,
      .playback-panel {
        padding: 13px;
        border-radius: 18px;
        border: 1px solid rgba(15, 59, 102, 0.08);
        background: #fbfdff;
      }
      .metric label,
      .muted {
        color: var(--muted);
        font-size: 12px;
      }
      .metric strong {
        display: block;
        margin-top: 5px;
        font-size: 15px;
        font-weight: 800;
      }

      .status {
        min-height: 18px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .map-shell {
        overflow: hidden;
        border-radius: 22px;
        border: 1px solid rgba(15, 59, 102, 0.08);
        background:
          linear-gradient(180deg, rgba(14, 165, 233, 0.08), rgba(255, 255, 255, 0)),
          linear-gradient(135deg, #f8fbfe, #eef5fb);
      }
      .map-stage {
        position: relative;
        aspect-ratio: 1 / 1;
        min-height: 260px;
      }
      .map-stage svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      .map-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--primary);
        font-size: 12px;
        font-weight: 700;
        box-shadow: 0 8px 20px rgba(15, 59, 102, 0.08);
      }
      .map-legend {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px 0;
        color: var(--muted);
        font-size: 12px;
      }

      .playback-panel {
        margin-top: 12px;
      }
      .playback-actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .playback-actions .btn {
        flex: 1;
        min-height: 40px;
      }
      .range {
        width: 100%;
        margin: 0;
      }
      .playback-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .playback-current {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }
      .playback-current strong {
        font-size: 16px;
      }

      .list {
        display: grid;
        gap: 10px;
      }
      .list-item-title {
        font-size: 15px;
        font-weight: 800;
      }
      .list-item-meta {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }
      .list-item.active {
        border-color: rgba(14, 165, 233, 0.34);
        background: linear-gradient(180deg, rgba(14, 165, 233, 0.08), #fbfdff);
        box-shadow: 0 10px 24px rgba(14, 165, 233, 0.08);
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .pill.success {
        background: rgba(21, 128, 61, 0.12);
        color: var(--success);
      }
      .pill.warning {
        background: rgba(180, 83, 9, 0.12);
        color: var(--warning);
      }
      .pill.info {
        background: var(--accent-soft);
        color: #0369a1;
      }

      .empty {
        padding: 16px;
        text-align: center;
        border: 1px dashed rgba(15, 59, 102, 0.16);
        border-radius: 16px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <a id="detail-back-link" class="btn soft" href="/mobile-attendance.html?v=20260403" style="min-height:34px;padding:0 12px;flex:0 0 auto;">返回</a>
        <div class="hero-copy">
          <h1 id="detail-employee-name">考勤详情</h1>
          <p id="detail-date-text">正在加载当天的打卡、拜访和轨迹回放。</p>
        </div>
        <button id="detail-refresh" class="btn secondary" type="button" style="min-height:34px;padding:0 12px;flex:0 0 auto;">刷新</button>
      </section>

      <section class="section">
        <h2>今日摘要</h2>
        <div class="grid two">
          <div class="metric"><label>考勤状态</label><strong id="detail-status">-</strong></div>
          <div class="metric"><label>净工资</label><strong id="detail-pay">VT 0</strong></div>
          <div class="metric"><label>首卡</label><strong id="detail-first">-</strong></div>
          <div class="metric"><label>末卡</label><strong id="detail-last">-</strong></div>
          <div class="metric"><label>工时</label><strong id="detail-hours">0 小时</strong></div>
          <div class="metric"><label>拜访数</label><strong id="detail-visits">0</strong></div>
        </div>
        <div id="detail-status-text" class="status"></div>
      </section>

      <section class="section">
        <h2>GPS 回放</h2>
        <div class="map-shell">
          <div class="map-stage">
            <svg id="track-map" viewBox="0 0 100 100" preserveAspectRatio="none" aria-label="GPS track map"></svg>
            <div id="track-map-badge" class="map-badge">等待轨迹</div>
          </div>
          <div class="map-legend">
            <span id="track-map-start">起点: -</span>
            <span id="track-map-end">终点: -</span>
          </div>
        </div>

        <div class="playback-panel">
          <div class="grid two">
            <div class="metric"><label>轨迹点数</label><strong id="track-total-points">0</strong></div>
            <div class="metric"><label>估算里程</label><strong id="track-distance">0 m</strong></div>
            <div class="metric"><label>采集时长</label><strong id="track-duration">-</strong></div>
            <div class="metric"><label>平均精度</label><strong id="track-accuracy">-</strong></div>
          </div>

          <div class="playback-actions">
            <button id="track-play" class="btn secondary" type="button">播放回放</button>
            <button id="track-reset" class="btn secondary" type="button">回到起点</button>
          </div>

          <input id="track-progress" class="range" type="range" min="0" max="0" step="1" value="0" />

          <div class="playback-meta">
            <span id="track-progress-label">第 0 / 0 点</span>
            <span id="track-progress-time">--:--:--</span>
          </div>

          <div class="playback-current">
            <div class="list-item">
              <div class="list-item-title" id="track-current-title">暂无轨迹点</div>
              <div class="list-item-meta" id="track-current-coords">坐标: -</div>
              <div class="list-item-meta" id="track-current-accuracy">精度: -</div>
              <div class="list-item-meta" id="track-current-extra">等待轨迹数据</div>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>打卡记录</h2>
        <div id="detail-checkins" class="list"></div>
      </section>

      <section class="section">
        <h2>拜访记录</h2>
        <div id="detail-visits-list" class="list"></div>
      </section>

      <section class="section">
        <h2>轨迹明细</h2>
        <div id="detail-tracks" class="list"></div>
      </section>
    </main>

    <script src="/mobile-attendance-detail.js?v=20260403"></script>
  </body>
</html>
