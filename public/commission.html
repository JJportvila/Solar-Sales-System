<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>光伏管理系统 / 佣金管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: "#0b2b5a", secondary: "#9a6b00", accent: "#f2b233", background: "#f6f7fb", panel: "#ffffff", line: "#d9deea", muted: "#6b7280" } } } };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }
      body { font-family: "Inter", sans-serif; }
      h1, h2, h3 { font-family: "Manrope", sans-serif; }
    </style>
  </head>
  <body class="min-h-screen bg-background text-slate-900 flex" data-nav="commission" data-header-title="光伏管理系统 / 佣金管理">
    <aside id="app-sidebar" class="hidden md:flex fixed left-0 top-0 z-40 h-screen w-64 flex-col bg-slate-50 py-6 shadow-[4px_0_24px_rgba(0,0,0,0.02)]"></aside>
    <header id="app-header" class="fixed top-0 z-30 h-16 w-full border-b border-slate-100/10 bg-white/80 px-6 backdrop-blur-md md:w-[calc(100%-16rem)]"></header>
    <main class="flex-1 pb-12 md:ml-64">
      <div class="mx-auto mt-16 w-full max-w-[1520px] space-y-8 px-6 py-6 lg:px-8 xl:px-10">
        <section class="space-y-3">
          <p class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">佣金管理</p>
          <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
              <h1 class="text-3xl font-extrabold tracking-tight text-primary md:text-4xl">佣金释放中心</h1>
              <p class="mt-2 max-w-3xl text-sm text-muted">集中处理佣金池、释放比例、已释放金额和锁定金额。</p>
            </div>
            <div class="flex gap-3">
              <button id="commission-export" class="rounded-xl border border-line bg-white px-4 py-3 text-sm font-bold text-primary">导出</button>
              <button id="commission-print" class="rounded-xl bg-primary px-4 py-3 text-sm font-bold text-white">打印</button>
            </div>
          </div>
        </section>
        <section class="rounded-[2rem] bg-primary p-7 text-white shadow-lg shadow-blue-900/10">
          <div class="flex flex-col gap-6 md:flex-row md:items-start md:justify-between">
            <div>
              <h2 class="flex items-center gap-2 text-2xl font-extrabold">
                <span class="material-symbols-outlined text-accent">savings</span>
                <span>佣金总览</span>
              </h2>
              <p class="mt-2 text-sm text-blue-100">点击详情可查看某个人的佣金构成，释放率和状态修改后会直接保存到后台。</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-white/10 px-6 py-4">
              <div class="text-xs uppercase tracking-[0.28em] text-blue-200">当前佣金池</div>
              <div id="commission-total" class="mt-2 text-4xl font-black text-accent">VT 0</div>
            </div>
          </div>
          <div id="commission-list" class="mt-6 space-y-4"></div>
        </section>
      </div>
    </main>

    <div id="commission-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/40 p-4">
      <div class="w-full max-w-2xl rounded-[2rem] bg-white p-6 shadow-2xl">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h2 class="text-2xl font-extrabold text-primary">佣金详情</h2>
            <p id="commission-modal-subtitle" class="mt-1 text-sm text-muted"></p>
          </div>
          <button id="commission-modal-close" class="rounded-xl bg-slate-100 px-3 py-2 text-sm font-bold text-primary">关闭</button>
        </div>
        <div id="commission-modal-body" class="mt-6"></div>
      </div>
    </div>

    <script src="/shared-nav.js"></script>
    <script src="/shared-header.js"></script>
    <script src="/commission.js"></script>
  </body>
</html>
