<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f3b66" />
    <title>客户详情 / Mobile</title>
    <link rel="icon" href="/mobile-icon.svg" type="image/svg+xml" />
    <style>
      :root { --bg:#eff5fa; --card:#ffffff; --line:rgba(15,59,102,.1); --text:#0f172a; --muted:#64748b; --primary:#0f3b66; --accent:#16a34a; --warn:#f59e0b; }
      * { box-sizing:border-box; }
      body { margin:0; background:linear-gradient(180deg,#eef5fb 0%,#f7fafc 100%); color:var(--text); font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      a { color:inherit; text-decoration:none; }
      .shell { max-width:480px; margin:0 auto; min-height:100vh; padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 28px); }
      .hero { margin-bottom:12px; background:none; color:var(--text); border-radius:0; padding:0; box-shadow:none; }
      .hero-top { display:flex; align-items:center; gap:12px; }
      .hero h1 { margin:0; font-size:20px; line-height:1.2; color:var(--text); }
      .hero .btn { background:#eef4fb; color:var(--primary); border:1px solid rgba(15,59,102,.12); }
      .hero p { margin:8px 0 0; color:var(--muted); font-size:13px; }
      .btn-row { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-top:14px; }
      .btn { display:inline-flex; align-items:center; justify-content:center; min-height:44px; border-radius:16px; padding:0 14px; font-weight:700; border:none; cursor:pointer; }
      .btn.primary { background:#fff; color:var(--primary); }
      .btn.secondary { background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.18); }
      .section { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:16px; margin-top:14px; box-shadow:0 10px 24px rgba(15,59,102,.05); }
      .section h2 { margin:0 0 12px; font-size:18px; }
      .grid { display:grid; gap:10px; }
      .grid.two { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .metric { border-radius:16px; background:#f8fbff; border:1px solid rgba(15,59,102,.08); padding:12px; }
      .metric label { display:block; color:var(--muted); font-size:11px; margin-bottom:5px; }
      .metric strong { font-size:14px; }
      .metric.span-full { grid-column:1 / -1; }
      .metric strong.metric-amount { font-size:18px; }
      .list { display:grid; gap:10px; }
      .item { border-radius:18px; background:#fbfdff; border:1px solid rgba(15,59,102,.08); padding:13px; }
      .item-title { font-weight:800; font-size:15px; }
      .item-meta, .muted { color:var(--muted); font-size:12px; }
      .tag { display:inline-flex; align-items:center; justify-content:center; padding:0 10px; min-height:28px; border-radius:999px; font-size:12px; font-weight:700; }
      .tag.primary { background:#dbeafe; color:#1d4ed8; }
      .tag.success { background:#dcfce7; color:#166534; }
      .tag.warn { background:#fef3c7; color:#92400e; }
      .empty { padding:16px; text-align:center; border:1px dashed rgba(15,59,102,.16); border-radius:16px; color:var(--muted); font-size:13px; }
      .progress { height:12px; border-radius:999px; background:#e2e8f0; overflow:hidden; margin-top:12px; }
      .progress > div { height:100%; background:linear-gradient(90deg,#0f3b66,#16a34a); width:0%; }
      .photo-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
      .photo-grid img { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:16px; border:1px solid rgba(15,59,102,.08); }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-top">
          <a class="btn secondary" href="/mobile-app.html" style="min-height:34px;padding:0 12px;flex:0 0 auto;">返回</a>
          <h1 id="customer-name">客户详情</h1>
          <a id="call-link" class="btn secondary" href="#" style="min-height:34px;padding:0 12px;margin-left:auto;">电话</a>
        </div>
        <p id="customer-subtitle">加载中...</p>
      </section>

      <section class="section">
        <h2>基础信息</h2>
        <div id="basic-grid" class="grid two"></div>
      </section>

      <section class="section">
        <h2>付款进度</h2>
        <div id="payment-grid" class="grid two"></div>
        <div class="progress"><div id="payment-progress"></div></div>
        <div class="grid" style="margin-top:14px;">
          <input id="payment-amount" type="number" min="0" placeholder="收款金额" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <input id="payment-date" type="date" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <select id="payment-collector" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;">
            <option value="">选择收款人</option>
          </select>
          <input id="payment-note" type="text" placeholder="收款备注" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <button id="payment-submit" class="btn primary" type="button">登记收款</button>
          <div id="payment-status" class="muted">可直接从手机登记收款。</div>
        </div>
        <div id="payment-history" class="list" style="margin-top:12px;"></div>
      </section>

      <section class="section">
        <h2>设备绑定 SN</h2>
        <div id="devices-list" class="list"></div>
      </section>

      <section class="section">
        <h2>订单与报价</h2>
        <div id="orders-list" class="list"></div>
        <div id="quotes-list" class="list" style="margin-top:10px;"></div>
      </section>

      <section class="section">
        <h2>维修与保修</h2>
        <div id="repairs-list" class="list"></div>
        <div class="grid" style="margin-top:14px;">
          <input id="warranty-search" type="text" placeholder="按设备序列号查询" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <button id="warranty-search-btn" class="btn secondary" type="button" style="color:var(--primary);background:#eef4fb;border:1px solid rgba(15,59,102,.12);">查询序列号</button>
          <div id="warranty-search-results" class="list"></div>
          <input id="warranty-title" type="text" placeholder="保修标题" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <input id="warranty-serial" type="text" placeholder="设备序列号（可选）" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <input id="warranty-date" type="date" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <input id="warranty-detail" type="text" placeholder="保修说明" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <button id="warranty-submit" class="btn primary" type="button">新增保修记录</button>
          <div id="warranty-status" class="muted">支持直接从手机登记保修。</div>
        </div>
        <div id="warranty-list" class="list" style="margin-top:10px;"></div>
      </section>

      <section class="section">
        <h2>现场照片</h2>
        <div class="grid" style="margin-bottom:12px;">
          <input id="photo-title" type="text" placeholder="照片标题" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:12px 14px;" />
          <input id="photo-file" type="file" accept="image/png,image/jpeg,image/webp,image/jpg" style="width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(15,59,102,.12);padding:10px 14px;background:#fff;" />
          <div id="photo-preview" class="photo-grid"></div>
          <button id="photo-submit" class="btn primary" type="button">上传现场照片</button>
          <div id="photo-status" class="muted">可直接拍照或从相册上传。</div>
        </div>
        <div id="photos-grid" class="photo-grid"></div>
      </section>
    </main>
    <script src="/mobile-customer-detail.js"></script>
  </body>
</html>
