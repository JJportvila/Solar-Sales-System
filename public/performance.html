<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>光伏管理系统 / 业绩分析</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              secondary: "#7f5700",
              "secondary-container": "#feb316",
              background: "#f8f9fa",
              primary: "#001d44",
              "surface-container-low": "#f3f4f5",
              "outline-variant": "#c3c6d1"
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }
      body { font-family: "Inter", sans-serif; }
      h1, h2, h3, h4, h5 { font-family: "Manrope", sans-serif; }
      #performance-map { min-height: 320px; }
      .leaflet-container { font-family: "Inter", sans-serif; }
    </style>
  </head>
  <body class="bg-background text-slate-900 min-h-screen flex" data-nav="analytics">
    <aside id="app-sidebar" class="hidden md:flex flex-col h-screen w-64 bg-slate-50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] fixed left-0 top-0 z-40 py-6"></aside>
    <header id="app-header"></header>

    <main class="flex-1 md:ml-64 pb-16">
      <div class="w-full max-w-[1520px] mx-auto px-6 lg:px-8 xl:px-10 py-6 lg:py-8 space-y-8">
        <section class="flex flex-col gap-6 xl:flex-row xl:items-end xl:justify-between">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">业绩分析</p>
            <h1 id="performance-title" class="mt-3 text-3xl md:text-4xl font-extrabold text-primary tracking-tight">区域经理业绩报告</h1>
            <p class="mt-3 max-w-3xl text-sm text-slate-600">基于报价、回款与销售角色自动汇总的月度业务表现。</p>
          </div>
          <div class="flex flex-wrap gap-3">
            <button id="performance-export-pdf" class="rounded-xl bg-white px-5 py-3 text-sm font-bold text-primary border border-outline-variant/20 flex items-center gap-2">
              <span class="material-symbols-outlined">picture_as_pdf</span>
              <span>打印预览</span>
            </button>
            <button id="performance-export-csv" class="rounded-xl bg-secondary px-5 py-3 text-sm font-bold text-white flex items-center gap-2 shadow-lg shadow-amber-700/10">
              <span class="material-symbols-outlined">download</span>
              <span>导出明细</span>
            </button>
          </div>
        </section>

        <section class="grid grid-cols-1 gap-6 md:grid-cols-3 xl:grid-cols-4">
          <button id="performance-achievement-card" class="md:col-span-2 rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm text-left transition hover:-translate-y-0.5 hover:shadow-md">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="inline-flex rounded-full bg-primary px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-white">本月销售达成率</div>
                <div id="performance-achievement" class="mt-6 text-6xl font-black text-primary">0%</div>
                <div id="performance-achievement-note" class="mt-2 text-sm font-bold text-teal-600">与上月持平</div>
              </div>
              <span class="material-symbols-outlined text-primary">trending_up</span>
            </div>
            <div id="performance-trend" class="mt-10 grid h-24 grid-cols-5 items-end gap-2"></div>
            <div class="mt-4 text-xs font-bold text-slate-400">点击查看本月达成详情</div>
          </button>

          <button id="performance-overdue-card" class="rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm text-left transition hover:-translate-y-0.5 hover:shadow-md">
            <div class="inline-flex rounded-full bg-amber-50 px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-secondary">待跟进未付款报价占比</div>
            <div id="performance-overdue" class="mt-6 text-5xl font-black text-primary">0%</div>
            <p class="mt-2 text-sm text-slate-500">点击查看未付款详细情报</p>
            <div class="mt-8 h-2 overflow-hidden rounded-full bg-slate-100">
              <div id="performance-overdue-bar" class="h-full rounded-full bg-teal-500" style="width:0%"></div>
            </div>
          </button>

          <button id="performance-active-projects-card" class="rounded-[2rem] bg-primary p-8 text-white shadow-lg shadow-blue-900/10 text-left transition hover:-translate-y-0.5 hover:shadow-xl">
            <span class="material-symbols-outlined text-secondary-container text-3xl">solar_power</span>
            <div id="performance-active-projects" class="mt-10 text-5xl font-black">0</div>
            <div class="mt-2 text-sm text-blue-100">在途业务项目</div>
            <div class="mt-4 text-xs font-bold text-blue-100/80">点击查看项目详情</div>
          </button>
        </section>

        <section class="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1.4fr)_minmax(320px,0.6fr)]">
          <div class="rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm">
            <div class="flex items-start justify-between gap-4">
              <div>
                <h2 class="text-xl font-extrabold text-primary">团队绩效自动汇总</h2>
                <p class="mt-2 text-sm text-slate-500">按销售与销售经理维度自动聚合报价业绩，点击姓名可查看个人详情。</p>
              </div>
              <div id="performance-total-actual" class="rounded-full bg-surface-container-low px-4 py-2 text-xs font-bold text-primary">VT 0</div>
            </div>
            <div class="mt-8 overflow-x-auto">
              <table class="w-full min-w-[760px] border-separate border-spacing-y-3 text-left">
                <thead>
                  <tr class="text-xs uppercase tracking-wider text-slate-400">
                    <th class="px-4 pb-2">销售代表</th>
                    <th class="px-4 pb-2">本月达成</th>
                    <th class="px-4 pb-2">目标</th>
                    <th class="px-4 pb-2">达成率</th>
                    <th class="px-4 pb-2">回款状态</th>
                    <th class="px-4 pb-2">标签</th>
                  </tr>
                </thead>
                <tbody id="performance-team-body"></tbody>
              </table>
            </div>
          </div>

          <div class="space-y-6">
            <div class="rounded-[2rem] bg-white p-6 border border-outline-variant/10 shadow-sm">
              <h2 class="text-lg font-extrabold text-primary">重点覆盖区域</h2>
              <p id="performance-region-name" class="mt-2 text-xs uppercase tracking-[0.24em] text-slate-400">Port Vila</p>
              <div id="performance-map" class="mt-5 overflow-hidden rounded-[1.75rem] border border-outline-variant/15"></div>
              <div class="mt-5 flex items-center justify-between text-sm">
                <span class="text-slate-500">区域覆盖率</span>
                <span id="performance-coverage" class="font-black text-primary">0%</span>
              </div>
            </div>

            <div class="rounded-[2rem] bg-white p-6 border border-outline-variant/10 shadow-sm">
              <h2 class="text-lg font-extrabold text-primary">月度业务洞察</h2>
              <p id="performance-insight" class="mt-4 text-sm leading-7 text-slate-600"></p>
            </div>

            <div class="rounded-[2rem] bg-primary p-8 text-white">
              <h2 class="text-2xl font-extrabold text-secondary-container">准备好提交了吗？</h2>
              <p class="mt-4 text-sm leading-7 text-blue-100">当前报告已经自动整合团队达成、回款风险与重点区域表现，可直接查看预览或生成打印报告。</p>
              <div class="mt-8 grid grid-cols-1 gap-3 sm:grid-cols-2">
                <button id="performance-generate-report" class="rounded-2xl bg-secondary-container px-6 py-3 text-sm font-black text-primary flex items-center justify-center gap-2">
                  <span class="material-symbols-outlined">auto_stories</span>
                  <span>生成报告</span>
                </button>
                <button id="performance-print-report" class="rounded-2xl border border-white/15 bg-white/10 px-6 py-3 text-sm font-black text-white flex items-center justify-center gap-2">
                  <span class="material-symbols-outlined">print</span>
                  <span>打印预览</span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <section id="performance-detail-panel" class="hidden rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm">
          <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
            <div>
              <p id="performance-detail-kicker" class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">详情</p>
              <h2 id="performance-detail-title" class="mt-3 text-2xl font-extrabold text-primary">详情面板</h2>
              <p id="performance-detail-summary" class="mt-3 text-sm leading-7 text-slate-600"></p>
            </div>
            <button id="performance-detail-close" class="rounded-xl border border-outline-variant/20 bg-white px-4 py-2 text-sm font-bold text-primary">关闭</button>
          </div>
          <div id="performance-detail-stats" class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-3"></div>
          <div id="performance-detail-table-wrap" class="mt-6 overflow-x-auto"></div>
        </section>
      </div>
    </main>

    <div id="performance-printable" class="hidden"></div>

    <script src="/shared-nav.js"></script>
    <script src="/shared-header.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/performance.js"></script>
  </body>
</html>
