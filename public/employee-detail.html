<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>光伏管理系统 / 员工详情</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              secondary: "#7f5700",
              "secondary-container": "#feb316",
              background: "#f8f9fa",
              primary: "#001d44",
              "surface-container-low": "#f3f4f5",
              "outline-variant": "#c3c6d1"
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }
      body { font-family: "Inter", sans-serif; }
      h1, h2, h3, h4, h5 { font-family: "Manrope", sans-serif; }
    </style>
  </head>
  <body class="bg-background text-slate-900 min-h-screen flex" data-nav="employee" data-header-title="光伏管理系统 / 员工详情">
    <aside id="app-sidebar" class="hidden md:flex flex-col h-screen w-64 bg-slate-50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] fixed left-0 top-0 z-40 py-6"></aside>
    <header id="app-header" class="fixed top-0 w-full md:w-[calc(100%-16rem)] z-30 bg-white/80 backdrop-blur-md flex justify-between items-center px-6 h-16 shadow-sm border-b border-slate-100/10"></header>

    <main class="flex-1 md:ml-64 pb-16">
      <div class="mt-16 w-full max-w-[1520px] mx-auto px-6 lg:px-8 xl:px-10 py-6 lg:py-8 space-y-8">
        <section class="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
          <div>
            <a href="/employee.html" class="inline-flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-primary">
              <span class="material-symbols-outlined text-base">arrow_back</span>
              返回员工管理
            </a>
            <p class="mt-4 text-xs font-bold uppercase tracking-[0.28em] text-secondary">员工详情</p>
            <h1 id="employee-detail-name" class="mt-3 text-3xl md:text-4xl font-extrabold text-primary tracking-tight">加载中...</h1>
            <p id="employee-detail-subtitle" class="mt-3 max-w-3xl text-sm text-slate-600">正在读取员工档案与关联业务数据。</p>
          </div>
        </section>

        <section class="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1.1fr)_minmax(360px,0.9fr)]">
          <div class="rounded-[2rem] bg-white p-8 shadow-sm border border-outline-variant/10">
            <div class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-4">
              <div class="rounded-2xl bg-surface-container-low px-5 py-4">
                <div class="text-xs uppercase tracking-[0.22em] text-slate-400">员工编号</div>
                <div id="employee-detail-no" class="mt-2 text-lg font-black text-primary">-</div>
              </div>
              <div class="rounded-2xl bg-surface-container-low px-5 py-4">
                <div class="text-xs uppercase tracking-[0.22em] text-slate-400">角色</div>
                <div id="employee-detail-role" class="mt-2 text-lg font-black text-primary">-</div>
              </div>
              <div class="rounded-2xl bg-surface-container-low px-5 py-4">
                <div class="text-xs uppercase tracking-[0.22em] text-slate-400">状态</div>
                <div id="employee-detail-status" class="mt-2 text-lg font-black text-primary">-</div>
              </div>
              <div class="rounded-2xl bg-surface-container-low px-5 py-4">
                <div class="text-xs uppercase tracking-[0.22em] text-slate-400">入职日期</div>
                <div id="employee-detail-hire-date" class="mt-2 text-lg font-black text-primary">-</div>
              </div>
            </div>

            <div class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
              <div class="rounded-2xl bg-surface-container-low px-5 py-4">
                <div class="text-xs uppercase tracking-[0.22em] text-slate-400">分支机构</div>
                <div id="employee-detail-branch" class="mt-2 text-base font-bold text-slate-800">-</div>
              </div>
              <div class="rounded-2xl bg-surface-container-low px-5 py-4">
                <div class="text-xs uppercase tracking-[0.22em] text-slate-400">联系方式</div>
                <div id="employee-detail-contact" class="mt-2 text-base font-bold text-slate-800">-</div>
              </div>
            </div>

            <div class="mt-6 rounded-[1.5rem] bg-surface-container-low p-5">
              <div class="text-xs uppercase tracking-[0.22em] text-slate-400">技能标签</div>
              <div id="employee-detail-skills" class="mt-4 flex flex-wrap gap-2"></div>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-1">
            <div class="rounded-[2rem] bg-white p-8 shadow-sm border border-outline-variant/10">
              <h2 class="text-xl font-extrabold text-primary">绩效指标</h2>
              <div id="employee-detail-metrics" class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-3 xl:grid-cols-1"></div>
            </div>
            <div class="rounded-[2rem] bg-primary p-8 text-white shadow-lg shadow-blue-900/10">
              <div class="text-xs uppercase tracking-[0.24em] text-blue-200">关联概览</div>
              <div id="employee-detail-relation-title" class="mt-3 text-2xl font-black">员工业务摘要</div>
              <div id="employee-detail-relation-text" class="mt-3 text-sm text-blue-100">正在统计关联维修单与报价数据。</div>
            </div>
          </div>
        </section>

        <section class="grid grid-cols-1 gap-6 xl:grid-cols-2">
          <div class="rounded-[2rem] bg-white p-8 shadow-sm border border-outline-variant/10">
            <div class="flex items-center justify-between gap-4">
              <div>
                <h2 class="text-xl font-extrabold text-primary">关联维修单</h2>
                <p class="mt-1 text-sm text-slate-500">工程师相关工单会在这里展示。</p>
              </div>
              <a href="/repair-list.html" class="text-sm font-bold text-primary">打开维修单列表</a>
            </div>
            <div id="employee-detail-repairs" class="mt-6 space-y-4"></div>
          </div>

          <div class="rounded-[2rem] bg-white p-8 shadow-sm border border-outline-variant/10">
            <div class="flex items-center justify-between gap-4">
              <div>
                <h2 class="text-xl font-extrabold text-primary">关联报价单</h2>
                <p class="mt-1 text-sm text-slate-500">销售、销售经理可在这里查看报价关联情况。</p>
              </div>
              <a href="/dashboard.html" class="text-sm font-bold text-primary">打开销售工作台</a>
            </div>
            <div id="employee-detail-quotes" class="mt-6 space-y-4"></div>
          </div>
        </section>
      </div>
    </main>

    <script src="/shared-nav.js"></script>
    <script src="/shared-header.js"></script>
    <script src="/employee-detail.js"></script>
  </body>
</html>
