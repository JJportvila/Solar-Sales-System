<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>光伏管理系统 维修单列表</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              secondary: "#7f5700",
              "secondary-container": "#feb316",
              background: "#f8f9fa",
              primary: "#001d44",
              "surface-container-low": "#f3f4f5",
              "outline-variant": "#c3c6d1"
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }
      body { font-family: "Inter", sans-serif; }
      h1, h2, h3, h4, h5 { font-family: "Manrope", sans-serif; }
    </style>
  </head>
  <body class="bg-background text-slate-900 min-h-screen flex" data-nav="repair" data-header-title="光伏管理系统 / 维修单列表">
    <aside id="app-sidebar" class="hidden md:flex flex-col h-screen w-64 bg-slate-50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] fixed left-0 top-0 z-40 py-6"></aside>
    <header id="app-header" class="fixed top-0 w-full md:w-[calc(100%-16rem)] z-30 bg-white/80 backdrop-blur-md flex justify-between items-center px-6 h-16 shadow-sm border-b border-slate-100/10"></header>

    <main class="flex-1 md:ml-64 pb-16">
      <div class="mt-16 w-full max-w-[1520px] mx-auto px-6 lg:px-8 xl:px-10 py-6 lg:py-8 space-y-8">
        <section class="flex flex-col md:flex-row md:items-start justify-between gap-6">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">维修工单</p>
            <h1 class="mt-3 text-3xl md:text-4xl font-extrabold text-primary tracking-tight">维修单列表页</h1>
            <p class="mt-3 max-w-3xl text-sm text-slate-600">查看全部维修单，支持搜索、编辑、删除和重新派单，点击卡片也可直接进入维修详情。</p>
          </div>
          <div class="flex flex-wrap gap-3">
            <a href="/repair-create.html" class="rounded-xl bg-primary px-5 py-3 text-sm font-bold text-white flex items-center gap-2">
              <span class="material-symbols-outlined">add_task</span>
              <span>新增维修单</span>
            </a>
          </div>
        </section>

        <section class="rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-[1fr_220px] gap-4">
            <input id="repair-list-search" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" placeholder="搜索工单号、标题、站点、客户..." type="text" />
            <select id="repair-list-status" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm">
              <option value="all">全部状态</option>
              <option value="pending">待处理</option>
              <option value="in_progress">维修中</option>
              <option value="completed">已完工</option>
            </select>
          </div>
          <div id="repair-list-wrap" class="space-y-4"></div>
        </section>
      </div>
    </main>

    <script src="/shared-nav.js"></script>
    <script src="/shared-header.js"></script>
    <script src="/repair-list.js"></script>
  </body>
</html>
