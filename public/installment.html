<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>光伏管理系统 / 分期管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: "#0b2b5a", secondary: "#9a6b00", accent: "#f2b233", background: "#f6f7fb", panel: "#ffffff", line: "#d9deea", muted: "#6b7280" } } } };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }
      body { font-family: "Inter", sans-serif; }
      h1, h2, h3 { font-family: "Manrope", sans-serif; }
    </style>
  </head>
  <body class="min-h-screen bg-background text-slate-900 flex" data-nav="installment" data-header-title="光伏管理系统 / 分期管理">
    <aside id="app-sidebar" class="hidden md:flex fixed left-0 top-0 z-40 h-screen w-64 flex-col bg-slate-50 py-6 shadow-[4px_0_24px_rgba(0,0,0,0.02)]"></aside>
    <header id="app-header" class="fixed top-0 z-30 h-16 w-full border-b border-slate-100/10 bg-white/80 px-6 backdrop-blur-md md:w-[calc(100%-16rem)]"></header>
    <main class="flex-1 pb-12 md:ml-64">
      <div class="mx-auto mt-16 w-full max-w-[1520px] space-y-8 px-6 py-6 lg:px-8 xl:px-10">
        <section class="space-y-3">
          <p class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">分期管理</p>
          <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
              <h1 class="text-3xl font-extrabold tracking-tight text-primary md:text-4xl">分期履约中心</h1>
              <p class="mt-2 max-w-3xl text-sm text-muted">集中处理客户分期计划、已完成周数、逾期风险和结清状态。</p>
            </div>
            <div class="flex gap-3">
              <button id="installment-export" class="rounded-xl border border-line bg-white px-4 py-3 text-sm font-bold text-primary">导出</button>
              <button id="installment-print" class="rounded-xl bg-primary px-4 py-3 text-sm font-bold text-white">打印</button>
            </div>
          </div>
        </section>
        <section class="rounded-[2rem] border border-line/60 bg-panel p-6 shadow-sm">
          <div class="flex items-center justify-between gap-4">
            <div>
              <h2 class="text-xl font-extrabold text-primary">全部分期计划</h2>
              <p class="mt-1 text-xs text-muted">点击详情可查看计划明细，修改后会直接保存到后台。</p>
            </div>
            <div id="installment-summary" class="rounded-2xl bg-slate-50 px-4 py-3 text-sm font-semibold text-primary">0 条计划</div>
          </div>
          <div id="installment-grid" class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2"></div>
        </section>
      </div>
    </main>

    <div id="installment-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/40 p-4">
      <div class="w-full max-w-2xl rounded-[2rem] bg-white p-6 shadow-2xl">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h2 class="text-2xl font-extrabold text-primary">分期详情</h2>
            <p id="installment-modal-subtitle" class="mt-1 text-sm text-muted"></p>
          </div>
          <button id="installment-modal-close" class="rounded-xl bg-slate-100 px-3 py-2 text-sm font-bold text-primary">关闭</button>
        </div>
        <div id="installment-modal-body" class="mt-6"></div>
      </div>
    </div>

    <script src="/shared-nav.js"></script>
    <script src="/shared-header.js"></script>
    <script src="/installment.js"></script>
  </body>
</html>
