<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10345b" />
    <title>工资结算</title>
    <link rel="icon" href="/mobile-icon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #eef4f7;
        --card: rgba(255, 255, 255, 0.96);
        --text: #10223a;
        --muted: #6b7a90;
        --primary: #10345b;
        --primary-soft: #dbe8f5;
        --accent: #0f766e;
        --warn: #c2410c;
        --line: rgba(16, 52, 91, 0.12);
        --shadow: 0 16px 40px rgba(16, 52, 91, 0.08);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(14, 165, 233, 0.15), transparent 28%),
          linear-gradient(180deg, #f2f7fb 0%, var(--bg) 42%, #e9f0f5 100%);
      }
      a { color: inherit; text-decoration: none; }
      button, input, select { font: inherit; }
      .shell {
        max-width: 520px;
        margin: 0 auto;
        min-height: 100vh;
        padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 28px);
      }
      .hero, .section {
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: var(--shadow);
      }
      .hero {
        padding: 18px;
        border-radius: var(--radius-xl);
      }
      .hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .hero h1 {
        margin: 10px 0 4px;
        font-size: 24px;
      }
      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }
      .section {
        margin-top: 14px;
        padding: 16px;
        border-radius: var(--radius-lg);
      }
      .section h2 {
        margin: 0 0 12px;
        font-size: 17px;
      }
      .btn, .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        font-weight: 700;
      }
      .btn {
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--primary);
        cursor: pointer;
      }
      .pill {
        min-height: 28px;
        padding: 0 10px;
        background: var(--primary-soft);
        color: var(--primary);
        font-size: 12px;
      }
      .status {
        min-height: 18px;
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        gap: 10px;
      }
      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .field, .card, .list-item {
        border: 1px solid rgba(16, 52, 91, 0.08);
        border-radius: var(--radius-md);
        background: #fbfdff;
      }
      .field {
        padding: 10px;
      }
      .field label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .field input, .field select {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(16, 52, 91, 0.12);
        border-radius: 14px;
        padding: 10px 12px;
        background: #fff;
      }
      .card {
        padding: 14px;
      }
      .card label, .meta {
        color: var(--muted);
        font-size: 12px;
      }
      .card strong {
        display: block;
        margin-top: 6px;
        font-size: 17px;
      }
      .headline {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      .headline-title {
        font-size: 18px;
        font-weight: 800;
      }
      .headline-sub {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }
      .bar {
        display: grid;
        gap: 8px;
        padding: 12px;
        border-radius: 18px;
        background: linear-gradient(135deg, #10345b 0%, #174d82 100%);
        color: #fff;
      }
      .bar .meta { color: rgba(255, 255, 255, 0.78); }
      .bar strong { display: block; font-size: 28px; }
      .list {
        display: grid;
        gap: 10px;
      }
      .list-item {
        padding: 13px;
      }
      .list-item-title {
        font-size: 15px;
        font-weight: 800;
      }
      .list-item-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 8px;
      }
      .empty {
        padding: 16px;
        text-align: center;
        border: 1px dashed rgba(16, 52, 91, 0.16);
        border-radius: 16px;
        color: var(--muted);
        font-size: 13px;
      }
      .good { color: var(--accent); }
      .warn { color: var(--warn); }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-top">
          <a class="btn" href="/mobile-app.html?v=20260403">返回</a>
          <span class="pill">最近15天结算</span>
        </div>
        <h1>工资结算</h1>
        <p id="payroll-period-label">按最近 15 天自动汇总出勤工资、VNPF 和预支扣回。</p>
      </section>

      <section class="section">
        <h2>筛选条件</h2>
        <div class="grid">
          <div class="field">
            <label for="payroll-date">结算截止日</label>
            <input id="payroll-date" type="date" />
          </div>
          <div class="field">
            <label for="payroll-user">员工</label>
            <select id="payroll-user"></select>
          </div>
        </div>
        <div id="payroll-status-text" class="status"></div>
      </section>

      <section class="section">
        <div class="headline">
          <div>
            <div class="headline-title" id="payroll-user-title">个人工资</div>
            <div class="headline-sub" id="payroll-window-text">最近 15 天工资结算</div>
          </div>
          <span class="pill" id="payroll-attendance-status">未出勤</span>
        </div>
        <div class="bar">
          <div class="meta">实发工资</div>
          <strong id="payroll-total">VT 0</strong>
          <div class="meta" id="payroll-net-note">净工资 = 出勤工资 - VNPF - 预支扣回</div>
        </div>
        <div class="grid two" style="margin-top:12px;">
          <div class="card"><label>出勤天数</label><strong id="payroll-worked-days">0 天</strong></div>
          <div class="card"><label>总工时</label><strong id="payroll-hours">0 小时</strong></div>
          <div class="card"><label>应发工资</label><strong id="payroll-gross">VT 0</strong></div>
          <div class="card"><label>VNPF 扣款</label><strong id="payroll-vnpf">VT 0</strong></div>
          <div class="card"><label>预支扣回</label><strong id="payroll-advance">VT 0</strong></div>
          <div class="card"><label>预支未清</label><strong id="payroll-outstanding">VT 0</strong></div>
          <div class="card"><label>拜访记录</label><strong id="payroll-visits">0 次</strong></div>
          <div class="card"><label>GPS 采点</label><strong id="payroll-tracks">0 点</strong></div>
        </div>
      </section>

      <section class="section">
        <h2>公司汇总</h2>
        <div class="grid two">
          <div class="card"><label>在岗人数</label><strong id="payroll-present">0</strong></div>
          <div class="card"><label>累计出勤天数</label><strong id="payroll-company-days">0</strong></div>
          <div class="card"><label>应发工资</label><strong id="payroll-company-gross">VT 0</strong></div>
          <div class="card"><label>实发工资</label><strong id="payroll-company-total">VT 0</strong></div>
          <div class="card"><label>VNPF 总扣款</label><strong id="payroll-company-vnpf">VT 0</strong></div>
          <div class="card"><label>预支总扣回</label><strong id="payroll-company-advance">VT 0</strong></div>
        </div>
      </section>

      <section class="section">
        <h2>每日出勤明细</h2>
        <div id="payroll-daily-list" class="list"></div>
      </section>

      <section class="section">
        <h2>预支与扣回记录</h2>
        <div id="payroll-advance-list" class="list"></div>
      </section>

      <section class="section">
        <h2>历史结算</h2>
        <div id="payroll-history-list" class="list"></div>
      </section>

      <section class="section">
        <h2>员工结算列表</h2>
        <div id="payroll-list" class="list"></div>
      </section>
    </main>

    <script src="/mobile-payroll.js?v=20260403"></script>
  </body>
</html>
