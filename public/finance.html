<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>光伏管理系统 / 财务收支</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              secondary: "#7f5700",
              "secondary-container": "#feb316",
              background: "#f8f9fa",
              primary: "#001d44",
              "surface-container-low": "#f3f4f5",
              "outline-variant": "#c3c6d1"
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }
      body { font-family: "Inter", sans-serif; }
      h1, h2, h3, h4, h5 { font-family: "Manrope", sans-serif; }
    </style>
  </head>
  <body class="bg-background text-slate-900 min-h-screen flex" data-nav="finance">
    <aside id="app-sidebar" class="hidden md:flex flex-col h-screen w-64 bg-slate-50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] fixed left-0 top-0 z-40 py-6"></aside>
    <header id="app-header" class="fixed top-0 w-full md:w-[calc(100%-16rem)] z-30 bg-white/80 backdrop-blur-md flex justify-between items-center px-6 h-16 shadow-sm border-b border-slate-100/10"></header>

    <main class="flex-1 md:ml-64 pb-16">
      <div class="w-full max-w-[1520px] mx-auto px-6 lg:px-8 xl:px-10 py-6 lg:py-8 space-y-8">
        <section class="flex flex-col gap-6 xl:flex-row xl:items-end xl:justify-between">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">财务收支</p>
            <h1 class="mt-3 text-3xl md:text-4xl font-extrabold text-primary tracking-tight">财务收支报表</h1>
            <p class="mt-3 max-w-3xl text-sm text-slate-600">实时查看太阳能业务收入、应收、利润率和回款效率。</p>
          </div>
          <div class="flex gap-3">
            <button id="finance-period-btn" class="rounded-xl bg-white px-5 py-3 text-sm font-bold text-primary border border-outline-variant/20 flex items-center gap-2">
              <span class="material-symbols-outlined">calendar_month</span>
              <span id="finance-period-label">本月</span>
            </button>
            <button id="finance-export-btn" class="rounded-xl bg-primary px-5 py-3 text-sm font-bold text-white flex items-center gap-2 shadow-lg shadow-blue-900/10">
              <span class="material-symbols-outlined">download</span>
              <span>导出总账</span>
            </button>
          </div>
        </section>

        <section class="grid grid-cols-1 gap-6 md:grid-cols-3">
          <button id="finance-revenue-card" class="rounded-[2rem] bg-white p-6 border border-outline-variant/10 shadow-sm text-left transition hover:-translate-y-0.5 hover:shadow-md">
            <div class="text-sm font-bold uppercase tracking-wider text-slate-400">月度总收入</div>
            <div id="finance-revenue" class="mt-4 text-5xl font-black text-primary">VUV 0</div>
            <div class="mt-3 flex items-center gap-2 text-emerald-600 text-sm font-bold"><span class="material-symbols-outlined text-base">trending_up</span><span>点击查看收入明细</span></div>
          </button>
          <button id="finance-ar-card" class="rounded-[2rem] bg-white p-6 border border-outline-variant/10 shadow-sm text-left transition hover:-translate-y-0.5 hover:shadow-md">
            <div class="text-sm font-bold uppercase tracking-wider text-slate-400">AR 应收账款余额</div>
            <div id="finance-ar" class="mt-4 text-5xl font-black text-secondary">VUV 0</div>
            <div class="mt-3 flex items-center gap-2 text-amber-600 text-sm font-bold"><span class="material-symbols-outlined text-base">history</span><span>点击查看应收详情</span></div>
          </button>
          <button id="finance-margin-card" class="rounded-[2rem] bg-primary p-6 text-white shadow-lg shadow-blue-900/10 text-left transition hover:-translate-y-0.5 hover:shadow-xl">
            <div class="text-sm font-bold uppercase tracking-wider text-blue-200">净利润率</div>
            <div id="finance-margin" class="mt-4 text-5xl font-black">0%</div>
            <div class="mt-3 flex items-center gap-2 text-blue-100 text-sm font-bold"><span class="material-symbols-outlined text-base">verified</span><span>点击查看利润构成</span></div>
          </button>
        </section>

        <section class="grid grid-cols-1 gap-6 lg:grid-cols-5">
          <div class="lg:col-span-3 rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm">
            <div class="flex items-center justify-between">
              <h2 class="text-xl font-extrabold text-primary flex items-center gap-2"><span class="material-symbols-outlined">pie_chart</span><span>分套装销售额分布</span></h2>
              <span class="rounded-full bg-surface-container-low px-3 py-1 text-[10px] font-bold">Q3 DATA</span>
            </div>
            <div id="finance-distribution" class="mt-8 space-y-6"></div>
          </div>

          <button id="finance-collection-card" class="lg:col-span-2 rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm text-left transition hover:-translate-y-0.5 hover:shadow-md">
            <h2 class="text-xl font-extrabold text-primary flex items-center gap-2"><span class="material-symbols-outlined">speed</span><span>回款周期效率分析</span></h2>
            <div class="mt-8 space-y-8">
              <div class="flex items-center gap-6">
                <div class="w-20 h-20 rounded-2xl bg-secondary/10 border-2 border-secondary/20 flex items-center justify-center"><div class="text-center"><div class="text-xs font-bold text-secondary">26周</div><div class="text-xl font-black text-secondary">效率</div></div></div>
                <div><div class="text-sm font-bold text-slate-500">高息短期回款</div><div id="finance-short-efficiency" class="mt-1 text-3xl font-black text-primary">0%</div></div>
              </div>
              <div class="h-px bg-outline-variant/20"></div>
              <div class="flex items-center gap-6">
                <div class="w-20 h-20 rounded-2xl bg-primary/10 border-2 border-primary/20 flex items-center justify-center"><div class="text-center"><div class="text-xs font-bold text-primary">52周</div><div class="text-xl font-black text-primary">效率</div></div></div>
                <div><div class="text-sm font-bold text-slate-500">常规长期回款</div><div id="finance-long-efficiency" class="mt-1 text-3xl font-black text-primary">0%</div></div>
              </div>
              <div class="rounded-2xl bg-amber-50 px-4 py-4 text-sm text-amber-800"><span class="font-bold">财务提示：</span>回款效率越高，现金流越健康，库存和安装排期越稳定。</div>
            </div>
          </button>
        </section>

        <section class="rounded-[2rem] bg-white border border-outline-variant/10 shadow-sm overflow-hidden">
          <div class="px-8 py-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between border-b border-outline-variant/10">
            <h2 class="text-xl font-extrabold text-primary flex items-center gap-2"><span class="material-symbols-outlined">table_chart</span><span>近期财务明细预览</span></h2>
            <div class="relative">
              <input id="finance-search" class="rounded-xl border border-outline-variant/25 bg-surface-container-low px-10 py-3 text-sm w-72" placeholder="搜索订单或客户..." type="text" />
              <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400 text-base">search</span>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full min-w-[840px] text-left">
              <thead class="bg-surface-container-low text-xs uppercase tracking-wider text-slate-400">
                <tr>
                  <th class="px-8 py-4">流水号</th>
                  <th class="px-4 py-4">类别</th>
                  <th class="px-4 py-4">客户</th>
                  <th class="px-4 py-4 text-right">金额 (VUV)</th>
                  <th class="px-4 py-4">状态</th>
                  <th class="px-8 py-4 text-right">操作</th>
                </tr>
              </thead>
              <tbody id="finance-ledger-body" class="divide-y divide-outline-variant/10"></tbody>
            </table>
          </div>
        </section>

        <section id="finance-detail-panel" class="hidden rounded-[2rem] bg-white p-8 border border-outline-variant/10 shadow-sm">
          <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
            <div>
              <p id="finance-detail-kicker" class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">详情</p>
              <h2 id="finance-detail-title" class="mt-3 text-2xl font-extrabold text-primary">详情面板</h2>
              <p id="finance-detail-summary" class="mt-3 text-sm leading-7 text-slate-600"></p>
            </div>
            <button id="finance-detail-close" class="rounded-xl border border-outline-variant/20 bg-white px-4 py-2 text-sm font-bold text-primary">关闭</button>
          </div>
          <div id="finance-detail-stats" class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-3"></div>
          <div id="finance-detail-table-wrap" class="mt-6 overflow-x-auto"></div>
        </section>
      </div>
    </main>

    <div id="finance-printable" class="hidden"></div>

    <script src="/shared-nav.js"></script>
    <script src="/shared-header.js"></script>
    <script src="/finance.js"></script>
  </body>
</html>
