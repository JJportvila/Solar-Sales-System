<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>光伏管理系统 新增维修单</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              secondary: "#7f5700",
              "secondary-container": "#feb316",
              background: "#f8f9fa",
              primary: "#001d44",
              "surface-container-low": "#f3f4f5",
              "outline-variant": "#c3c6d1"
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }
      body { font-family: "Inter", sans-serif; }
      h1, h2, h3, h4, h5 { font-family: "Manrope", sans-serif; }
      #rc-map { min-height: 320px; border-radius: 1.5rem; }
    </style>
  </head>
  <body class="bg-background text-slate-900 min-h-screen flex" data-nav="repair" data-header-title="光伏管理系统 / 新增维修单">
    <aside id="app-sidebar" class="hidden md:flex flex-col h-screen w-64 bg-slate-50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] fixed left-0 top-0 z-40 py-6"></aside>
    <header id="app-header" class="fixed top-0 w-full md:w-[calc(100%-16rem)] z-30 bg-white/80 backdrop-blur-md flex justify-between items-center px-6 h-16 shadow-sm border-b border-slate-100/10"></header>

    <main class="flex-1 md:ml-64 pb-16">
      <div class="mt-16 w-full max-w-[1520px] mx-auto px-6 lg:px-8 xl:px-10 py-6 lg:py-8 space-y-8">
        <section class="flex flex-col md:flex-row md:items-start justify-between gap-6">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.28em] text-secondary">新增维修单</p>
            <h1 class="mt-3 text-3xl md:text-4xl font-extrabold text-primary tracking-tight">创建维修工单</h1>
            <p class="mt-3 max-w-3xl text-sm text-slate-600">支持客户资料、派单工程师、备件预选和地图坐标选点，保存后直接进入维修详情页。</p>
          </div>
          <div class="flex flex-wrap gap-3">
            <a href="/repair-list.html" class="rounded-xl border border-outline-variant/20 bg-white px-5 py-3 text-sm font-bold text-primary flex items-center gap-2">
              <span class="material-symbols-outlined">list_alt</span>
              <span>维修单列表</span>
            </a>
            <a href="/repair.html" class="rounded-xl border border-outline-variant/20 bg-white px-5 py-3 text-sm font-bold text-primary flex items-center gap-2">
              <span class="material-symbols-outlined">arrow_back</span>
              <span>返回维修详情</span>
            </a>
          </div>
        </section>

        <section class="grid grid-cols-1 xl:grid-cols-[1.2fr_0.8fr] gap-8">
          <div class="space-y-8">
            <section class="rounded-[2rem] bg-white p-8 border border-outline-variant/15 shadow-sm space-y-6">
              <h2 class="text-xl font-bold text-primary">工单基础信息</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-title">故障标题</label>
                  <input id="rc-title" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="text" />
                </div>
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-priority">优先级</label>
                  <select id="rc-priority" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm">
                    <option value="P1">P1</option>
                    <option value="P2" selected>P2</option>
                    <option value="P3">P3</option>
                  </select>
                </div>
              </div>
              <div>
                <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-description">故障描述</label>
                <textarea id="rc-description" class="min-h-[140px] w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm"></textarea>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-eta-date">预计日期</label>
                  <input id="rc-eta-date" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="date" />
                </div>
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-eta-time">预计时间</label>
                  <input id="rc-eta-time" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="time" />
                </div>
              </div>
              <div>
                <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-note">初始备注</label>
                <textarea id="rc-note" class="min-h-[110px] w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm"></textarea>
              </div>
            </section>

            <section class="rounded-[2rem] bg-white p-8 border border-outline-variant/15 shadow-sm space-y-6">
              <h2 class="text-xl font-bold text-primary">客户与派单信息</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-customer-name">客户姓名</label>
                  <input id="rc-customer-name" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="text" />
                </div>
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-customer-phone">电话</label>
                  <input id="rc-customer-phone" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="text" />
                </div>
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-customer-email">邮箱</label>
                  <input id="rc-customer-email" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="email" />
                </div>
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-engineer">派单工程师</label>
                  <select id="rc-engineer" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm"></select>
                </div>
              </div>
              <div>
                <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-customer-address">客户地址</label>
                <textarea id="rc-customer-address" class="min-h-[90px] w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm"></textarea>
              </div>
            </section>

            <section class="rounded-[2rem] bg-white p-8 border border-outline-variant/15 shadow-sm space-y-6">
              <div class="flex items-center justify-between gap-4">
                <h2 class="text-xl font-bold text-primary">站点与坐标</h2>
                <button id="rc-use-current-location" class="rounded-xl bg-surface-container-low px-4 py-2 text-sm font-bold text-primary" type="button">锁定当前位置</button>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-asset-name">设备/站点名称</label>
                  <input id="rc-asset-name" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="text" />
                </div>
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-asset-address">站点地址</label>
                  <input id="rc-asset-address" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="text" />
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-latitude">纬度</label>
                  <input id="rc-latitude" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="number" step="0.000001" />
                </div>
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-longitude">经度</label>
                  <input id="rc-longitude" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="number" step="0.000001" />
                </div>
                <div>
                  <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500" for="rc-coordinates">坐标文本</label>
                  <input id="rc-coordinates" class="w-full rounded-2xl border border-outline-variant/25 bg-surface-container-low px-4 py-3 text-sm" type="text" readonly />
                </div>
              </div>
              <div id="rc-map"></div>
              <p class="text-xs text-slate-500">可直接点击地图选择站点坐标，或使用“锁定当前位置”。</p>
            </section>

            <section class="rounded-[2rem] bg-white p-8 border border-outline-variant/15 shadow-sm space-y-6">
              <h2 class="text-xl font-bold text-primary">备件预选</h2>
              <div id="rc-spare-parts" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section class="rounded-[2rem] bg-white p-8 border border-outline-variant/15 shadow-sm">
              <div class="flex flex-wrap gap-3">
                <button id="rc-save" class="rounded-2xl bg-primary px-6 py-3 text-sm font-bold text-white" type="button">创建维修单</button>
                <a href="/repair-list.html" class="rounded-2xl bg-surface-container-low px-6 py-3 text-sm font-bold text-primary">取消</a>
              </div>
              <div id="rc-message" class="hidden mt-4 rounded-2xl p-4 text-sm"></div>
            </section>
          </div>

          <aside class="rounded-[2rem] bg-primary p-8 text-white shadow-2xl shadow-primary/20 h-fit sticky top-24">
            <h3 class="text-2xl font-black">工单预览</h3>
            <div class="mt-6 space-y-4 text-sm text-white/85">
              <div class="rounded-2xl bg-white/10 p-4">
                <div class="text-[11px] uppercase tracking-widest text-secondary-container">故障标题</div>
                <div id="rc-preview-title" class="mt-2 text-xl font-bold">-</div>
              </div>
              <div class="rounded-2xl bg-white/10 p-4">
                <div class="text-[11px] uppercase tracking-widest text-secondary-container">客户</div>
                <div id="rc-preview-customer" class="mt-2 font-bold">-</div>
              </div>
              <div class="rounded-2xl bg-white/10 p-4">
                <div class="text-[11px] uppercase tracking-widest text-secondary-container">工程师</div>
                <div id="rc-preview-engineer" class="mt-2 font-bold">-</div>
              </div>
              <div class="rounded-2xl bg-white/10 p-4">
                <div class="text-[11px] uppercase tracking-widest text-secondary-container">站点</div>
                <div id="rc-preview-asset" class="mt-2 font-bold">-</div>
              </div>
              <div class="rounded-2xl bg-white/10 p-4">
                <div class="text-[11px] uppercase tracking-widest text-secondary-container">预计时间</div>
                <div id="rc-preview-eta" class="mt-2 font-bold">-</div>
              </div>
              <div class="rounded-2xl bg-white/10 p-4">
                <div class="text-[11px] uppercase tracking-widest text-secondary-container">预选备件</div>
                <div id="rc-preview-parts" class="mt-2 font-bold">-</div>
              </div>
            </div>
          </aside>
        </section>
      </div>
    </main>

    <script src="/shared-nav.js"></script>
    <script src="/shared-header.js"></script>
    <script src="/repair-create.js"></script>
  </body>
</html>
